# AI-Sec Findings Registry
# Track findings across audit runs. Updated after each /audit cycle.
# Use /track to manage this file, or edit manually.
#
# verify.expect values:
#   absent  — the grep pattern should NOT be found (if found → fix exists → RESOLVED)
#   present — the grep pattern SHOULD be found (if found → vuln exists → OPEN)
#
# Copy this file to your project root as findings-registry.yaml and fill in the details.

project: "{project-name}"
last_audit: "{date}"
findings: []

