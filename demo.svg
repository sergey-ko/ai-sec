<svg xmlns="http://www.w3.org/2000/svg" width="820" height="580" viewBox="0 0 820 580">
  <style>
    .bg { fill: #1e1e2e; }
    .titlebar { fill: #313244; }
    .btn-red { fill: #f38ba8; }
    .btn-yellow { fill: #f9e2af; }
    .btn-green { fill: #a6e3a1; }
    .text { fill: #cdd6f4; font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
    .prompt { fill: #89b4fa; }
    .command { fill: #f9e2af; }
    .check { fill: #a6e3a1; }
    .cross { fill: #f38ba8; }
    .dim { fill: #6c7086; }
    .heading { fill: #cba6f7; font-weight: bold; }
    .critical { fill: #f38ba8; font-weight: bold; }
    .high { fill: #fab387; font-weight: bold; }
    .medium { fill: #f9e2af; }
    .low { fill: #a6e3a1; }
    .info { fill: #89b4fa; }
    .bold { fill: #cdd6f4; font-weight: bold; }
    .line { stroke: #45475a; stroke-width: 1; }
  </style>

  <!-- Background -->
  <rect class="bg" width="820" height="580" rx="10"/>

  <!-- Title bar -->
  <rect class="titlebar" width="820" height="36" rx="10"/>
  <rect class="bg" y="26" width="820" height="10"/>
  <circle class="btn-red" cx="20" cy="18" r="6"/>
  <circle class="btn-yellow" cx="40" cy="18" r="6"/>
  <circle class="btn-green" cx="60" cy="18" r="6"/>
  <text class="dim" x="370" y="22" text-anchor="middle">ai-sec demo</text>

  <!-- Content -->
  <!-- Prompt + command -->
  <text y="62" x="16">
    <tspan class="prompt">~/my-app $</tspan>
    <tspan class="command"> claude /audit</tspan>
  </text>

  <!-- Stack detection -->
  <text class="heading" x="16" y="90">AI-Sec Stack Detection:</text>
  <text class="text" x="16" y="110">
    <tspan class="check">  &#x2713;</tspan><tspan class="text"> Web Application: Next.js 14 (TypeScript)</tspan>
  </text>
  <text class="text" x="16" y="128">
    <tspan class="check">  &#x2713;</tspan><tspan class="text"> API Endpoints: 12 REST routes, 3 webhook handlers</tspan>
  </text>
  <text class="text" x="16" y="146">
    <tspan class="check">  &#x2713;</tspan><tspan class="text"> CI/CD Pipeline: GitHub Actions (4 workflows)</tspan>
  </text>
  <text class="text" x="16" y="164">
    <tspan class="cross">  &#x2717;</tspan><tspan class="dim"> Infrastructure: not found</tspan>
  </text>
  <text class="text" x="16" y="182">
    <tspan class="cross">  &#x2717;</tspan><tspan class="dim"> Mobile: not found</tspan>
  </text>

  <!-- Agents -->
  <text class="text" x="16" y="210">Agents: web-app-auditor, api-auditor, cicd-auditor</text>
  <text class="dim" x="16" y="232">Launching 3 agents in parallel...</text>

  <text class="text" x="16" y="258">
    <tspan class="check">  &#x2713;</tspan><tspan class="text"> cicd-auditor    </tspan><tspan class="dim">complete (4 findings)</tspan>
  </text>
  <text class="text" x="16" y="276">
    <tspan class="check">  &#x2713;</tspan><tspan class="text"> api-auditor     </tspan><tspan class="dim">complete (5 findings)</tspan>
  </text>
  <text class="text" x="16" y="294">
    <tspan class="check">  &#x2713;</tspan><tspan class="text"> web-app-auditor </tspan><tspan class="dim">complete (8 findings)</tspan>
  </text>

  <!-- Divider -->
  <line class="line" x1="16" y1="314" x2="804" y2="314"/>

  <!-- Report header -->
  <text class="heading" x="16" y="338">AI-Sec Report: my-nextjs-app</text>

  <!-- Table header -->
  <text class="bold" x="16" y="362">Zone                 CRIT  HIGH  MED   LOW   INFO</text>
  <line class="line" x1="16" y1="370" x2="500" y2="370"/>

  <!-- Table rows -->
  <text class="text" x="16" y="388">Web Application       </text>
  <text class="critical" x="238" y="388">1</text>
  <text class="high" x="290" y="388">3</text>
  <text class="medium" x="348" y="388">2</text>
  <text class="low" x="404" y="388">1</text>
  <text class="info" x="464" y="388">1</text>

  <text class="text" x="16" y="406">API Security          </text>
  <text class="critical" x="238" y="406">1</text>
  <text class="high" x="290" y="406">2</text>
  <text class="medium" x="348" y="406">1</text>
  <text class="low" x="404" y="406">1</text>
  <text class="info" x="464" y="406">0</text>

  <text class="text" x="16" y="424">CI/CD Pipeline        </text>
  <text class="dim" x="238" y="424">0</text>
  <text class="high" x="290" y="424">1</text>
  <text class="medium" x="348" y="424">2</text>
  <text class="low" x="404" y="424">1</text>
  <text class="info" x="464" y="424">0</text>

  <line class="line" x1="16" y1="434" x2="500" y2="434"/>

  <text class="bold" x="16" y="452">Total                 </text>
  <text class="critical" x="238" y="452">2</text>
  <text class="high" x="290" y="452">6</text>
  <text class="medium" x="348" y="452">5</text>
  <text class="low" x="404" y="452">3</text>
  <text class="info" x="464" y="452">1</text>

  <!-- Top findings -->
  <text class="text" x="16" y="482">Top findings:</text>
  <text x="16" y="502">
    <tspan class="critical">[CRIT]</tspan><tspan class="text"> AUTH-01: JWT tokens issued with no expiration</tspan>
  </text>
  <text x="16" y="520">
    <tspan class="critical">[CRIT]</tspan><tspan class="text"> API-05: Webhook HMAC uses parsed body, not raw</tspan>
  </text>
  <text x="16" y="538">
    <tspan class="high">[HIGH]</tspan><tspan class="text"> AUTH-03: Session fixation &#x2014; no ID rotation on login</tspan>
  </text>

  <text class="dim" x="16" y="566">Report saved to ./ai-sec-report.md</text>
</svg>
